name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: >-
          Thanks for opening your first issue on this repository! Make sure
          you've read our
          [contributing guidelines](https://github.com/TheGittyPerson/ThePerson/blob/main/.github/CONTRIBUTING.md)
          — it's very important to us.
        pr-message: >-
          Thanks for opening your first PR on this repository! Make sure you've
          read our 
          [contributing guidelines](https://github.com/TheGittyPerson/ThePerson/blob/main/.github/CONTRIBUTING.md)
          — it's very important to us.
